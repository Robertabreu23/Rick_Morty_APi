@if (character(); as c) {
  <button class="back-btn" routerLink="/">
    <span class="arrow">&#8592;</span>
    <span>Volver</span>
  </button>

  <h2>{{ c.name }}</h2>

  <img [src]="c.image" [alt]="c.name" width="200">

  <p><strong>Status:</strong> {{ c.status }}</p>
  <p><strong>Species:</strong> {{ c.species }}</p>
  <p><strong>Gender:</strong> {{ c.gender }}</p>
}
